<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的作品集</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background:#0f0f10;
      color:#fff;
      line-height:1.6;
    }
    .container { width:90%; max-width:1100px; margin:auto; }
    header { padding:60px 0; }
    h1 { font-size:40px; font-weight:600; }
    p.subtitle { color:#aaa; margin-top:10px; }

    .section { margin:80px 0; }
    .section-title { font-size:22px; margin-bottom:30px; border-bottom:1px solid #333; padding-bottom:10px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background:#1a1a1c;
      border-radius:16px;
      overflow:hidden;
      transition:0.3s;
    }
    .card:hover { transform:translateY(-5px); }

    .card img { width:100%; display:block; }
    .card-content { padding:15px; }
    .card-title { font-size:16px; margin-bottom:5px; }
    .card-desc { font-size:13px; color:#aaa; }

    .about { max-width:600px; }

    footer {
      margin:100px 0 40px;
      text-align:center;
      color:#666;
      font-size:14px;
    }

    a { color:#fff; text-decoration:none; }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>龚著登</h1>
      <p class="subtitle">电商设计师 / 视觉设计</p>
    </header>

    <section class="section">
      <div class="section-title">作品集</div>
      <div class="grid">

        <div class="card">
          <img src="images/1.png" alt="作品1">
          <div class="card-content">
            <div class="card-title">淘宝主图设计</div>
            <div class="card-desc">提升点击率的视觉优化</div>
          </div>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/400x300" alt="作品2">
          <div class="card-content">
            <div class="card-title">AI海报设计</div>
            <div class="card-desc">结合AI生成的创意视觉</div>
          </div>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/400x300" alt="作品3">
          <div class="card-content">
            <div class="card-title">C4D场景</div>
            <div class="card-desc">简约高级产品展示</div>
          </div>
        </div>

      </div>
    </section>

    <section class="section">
      <div class="section-title">关于我</div>
      <div class="about">
        <p>我是一名电商设计师，我很牛逼，擅长淘宝主图、详情页设计，以及AI视觉创作。注重画面高级感和转化率的平衡。</p>
      </div>
    </section>

    <section class="section">
      <div class="section-title">联系方式</div>
      <p>微信 / 邮箱：1711325061@qq.com</p>
    </section>

    <footer>
      © 2026 龚著登
    </footer>

  </div>

</body>
</html>
